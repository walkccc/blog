{{- range .GroupByDate "2006" }}
<section class="year-group">
  <h2 class="label">{{ .Key }}</h2>
  <ul class="post-list">
    {{- range .Pages }}
    <li>
      <a href="{{ .RelPermalink }}">
        <span class="post-title">{{ .Title }}</span>
        <time datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "Jan 2" }}</time>
      </a>
    </li>
    {{- end }}
  </ul>
</section>
{{- end }}
